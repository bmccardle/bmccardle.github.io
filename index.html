---
layout: default
---

{% for post in site.posts limit: 10 %}

<header>
 <h2><a class="permalink" title="Permalink" href="{{ site.baseurl}}{{ post.url }}">{{ post.title }}</a></h2>
 {{ post.date | date: "%B %-d, %Y" }}
</header>

 <p>{{ post.content | truncatewords: 25 }}  <a href="{{ site.baseurl}}{{ post.url }}">&infin;</a></p>


{% endfor %}
